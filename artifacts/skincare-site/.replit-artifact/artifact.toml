kind = "web"
previewPath = "/"
title = "Glow Up - Skincare"
version = "1.0.0"
id = "artifacts/skincare-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25930

[services.development]
run = "pnpm --filter @workspace/skincare-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skincare-site", "run", "build" ]
publicDir = "artifacts/skincare-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25930"
BASE_PATH = "/"
